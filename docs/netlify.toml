# Fully static site: every route is RouteBuilder.single / preRender (no serverRender),
# so the elm-pages Netlify functions (render/server-render) are unused. We do NOT
# declare `functions` here — Netlify's default functions dir is netlify/functions, so
# it ignores the elm-pages `functions/` output and skips the (heavy, failing) bundle.
[build]
  publish = "dist/"
  command = "export ELM_HOME=\"$NETLIFY_BUILD_BASE/cache/elm\" && corepack enable && pnpm install --frozen-lockfile && pnpm run build"

[build.environment]
  NODE_VERSION = "22"

[dev]
  command = "pnpm start"
  targetPort = 1234
  autoLaunch = true
  framework = "#custom"
